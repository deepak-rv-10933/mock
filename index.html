<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlassOps — Productivity across the organisation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f3f5f7; --card:#ffffff; --line:#e3e8ee; --line2:#d3dbe3;
  --ink:#22303c; --ink2:#5b6b7a; --ink3:#8a99a8;
  --blue:#2a71d4; --blue-soft:#eaf2fc;
  --red:#d64541; --red-soft:#fdecec;
  --green:#1e9e63; --green-soft:#e6f6ee;
  --orange:#e08a00; --orange-soft:#fdf3e0;
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--ink);font-size:13.5px}
button{font-family:inherit;cursor:pointer}
.mono{font-family:'IBM Plex Mono',monospace}

/* top bar */
.top{height:52px;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 18px;position:sticky;top:0;z-index:20}
.logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px}
.logo .sq{width:26px;height:26px;border-radius:6px;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:13px}
.rolebox{margin-left:18px;display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink2)}
.rolebox select{font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);border:1px solid var(--line2);border-radius:6px;padding:6px 10px;background:var(--card)}
.zia{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink2)}
.zia .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--blue-soft);color:var(--blue);display:grid;place-items:center;font-weight:700;font-size:12px}

/* shell */
.shell{display:grid;grid-template-columns:216px 1fr 380px;min-height:calc(100vh - 52px)}
@media(max-width:1200px){.shell{grid-template-columns:1fr 380px}.side{display:none}}
@media(max-width:950px){.shell{grid-template-columns:1fr}}

/* sidebar */
.side{background:var(--card);border-right:1px solid var(--line);padding:12px 0}
.side a{display:flex;align-items:center;gap:10px;padding:9px 16px;color:var(--ink2);text-decoration:none;font-size:13px;border-left:3px solid transparent}
.side a.on{color:var(--blue);border-left-color:var(--blue);background:var(--blue-soft);font-weight:600}
.side a:hover{background:#f6f8fa}
.side .ic{width:16px;height:16px;border-radius:4px;background:var(--ink3);opacity:.5}
.side a.on .ic{background:var(--blue);opacity:1}
.side .sec{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);padding:12px 16px 5px}
.side .badge{margin-left:auto;background:var(--orange-soft);color:var(--orange);border-radius:9px;font-size:10px;font-weight:700;padding:1px 7px;font-family:'IBM Plex Mono'}
.side .badge.ok{background:var(--green-soft);color:var(--green)}
.side a.dead{opacity:.55;cursor:default}
.side .av2{width:20px;height:20px;border-radius:6px;background:var(--blue-soft);color:var(--blue);display:grid;place-items:center;font-size:9px;font-weight:700;flex-shrink:0}
.side a.on .av2{background:var(--blue);color:#fff}

/* main */
.main{padding:16px 18px;min-width:0}
.crumb{font-size:12px;color:var(--ink3);margin-bottom:4px}
.title{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.title h1{font-size:18px;font-weight:700}
.title .sub{font-size:12.5px;color:var(--ink2)}
.insight{background:var(--blue-soft);border:1px solid #cfe1f8;border-radius:var(--r);padding:11px 14px;font-size:13px;line-height:1.55;margin-bottom:14px;display:flex;gap:10px}
.insight .tag{flex-shrink:0;background:var(--blue);color:#fff;font-size:10.5px;font-weight:700;letter-spacing:.05em;padding:3px 9px;border-radius:5px;height:fit-content;margin-top:1px}
.insight b{color:var(--blue)}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:11px 13px}
.kpi .l{font-size:11px;color:var(--ink3);letter-spacing:.03em;text-transform:uppercase}
.kpi .v{font-size:21px;font-weight:700;margin-top:3px}
.kpi .d{font-size:11.5px;margin-top:2px}
.up{color:var(--green)} .dn{color:var(--red)} .fl{color:var(--ink3)} .warn{color:var(--orange)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:1450px){.grid2{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;margin-bottom:14px}
.card h2{font-size:13.5px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:8px}
.card h2 .src{margin-left:auto;font-size:10px;font-weight:400;color:var(--ink3);font-family:'IBM Plex Mono'}
.card .sub{font-size:11.5px;color:var(--ink3);margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);text-align:left;padding:6px 8px;border-bottom:1px solid var(--line);font-weight:700}
td{padding:7px 8px;border-bottom:1px solid #eef1f5;color:var(--ink2)}
td b{color:var(--ink);font-weight:700}
td.n{font-family:'IBM Plex Mono';font-size:12px}
tr.hot td{background:var(--red-soft)}
tr:hover td{background:#f7f9fb}
tr.hot:hover td{background:#fbe2e2}
.pill{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.pg{background:var(--green-soft);color:var(--green)} .po{background:var(--orange-soft);color:var(--orange)} .pr{background:var(--red-soft);color:var(--red)} .pb{background:var(--blue-soft);color:var(--blue)}

/* agent panel */
.agent{background:var(--card);border-left:1px solid var(--line);display:flex;flex-direction:column;max-height:calc(100vh - 52px);position:sticky;top:52px}
@media(max-width:950px){.agent{position:static;max-height:none;border-left:none;border-top:1px solid var(--line)}}
.ahead{display:flex;align-items:center;gap:9px;padding:12px 15px;border-bottom:1px solid var(--line)}
.ahead .zicon{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#7b5cd6,#2a71d4);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700}
.ahead h2{font-size:14px;font-weight:700}
.ahead .chip{margin-left:auto;font-size:11px;font-weight:700;background:var(--orange-soft);color:var(--orange);border-radius:10px;padding:3px 9px}
.abody{overflow-y:auto;padding:12px 14px;flex:1}
.sechead{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin:2px 0 8px;font-weight:700}
.dcard{display:flex;gap:10px;align-items:center;border:1px solid var(--line2);border-radius:var(--r);padding:9px 10px;margin-bottom:7px}
.dcard.done{border-color:var(--green);background:var(--green-soft)}
.dnum{width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-weight:700;font-size:12px;flex-shrink:0}
.dcard.done .dnum{background:var(--green)}
.dbody{flex:1;min-width:0}
.dbody b{display:block;font-size:12.5px;line-height:1.3}
.dbody span{display:block;font-size:11px;color:var(--ink2);margin-top:1px}
.dbtns{display:flex;gap:6px;flex-shrink:0}
.mini{font-size:11.5px;font-weight:700;border-radius:6px;padding:5px 10px;border:1px solid var(--line2);background:var(--card);color:var(--ink2)}
.mini:hover{border-color:var(--blue);color:var(--blue)}
.mini.ok{background:var(--blue);border-color:var(--blue);color:#fff}
.mini.ok:hover{background:#2260b8}
.mini.ok:disabled{background:var(--green);border-color:var(--green);cursor:default}

.detail{border:1px solid var(--line2);border-radius:var(--r);padding:12px 13px;font-size:12.5px;line-height:1.5;margin:10px 0;background:#fbfcfe}
.detail .dt{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sev{font-size:9.5px;letter-spacing:.06em;padding:2px 7px;border-radius:5px;font-weight:700}
.sev.r{background:var(--red-soft);color:var(--red)} .sev.a{background:var(--orange-soft);color:var(--orange)} .sev.g{background:var(--green-soft);color:var(--green)}
.cstep{display:flex;gap:9px;align-items:flex-start}
.cnum{width:20px;height:20px;border-radius:50%;background:#eef1f5;border:1px solid var(--line2);color:var(--ink2);display:grid;place-items:center;font-family:'IBM Plex Mono';font-size:10.5px;flex-shrink:0;margin-top:1px}
.cstep.root .cnum{background:var(--red-soft);border-color:var(--red);color:var(--red);font-weight:700}
.cstep .ct{font-size:12px;line-height:1.45}
.cstep .ct b{color:var(--blue);font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase;display:block}
.cstep.root .ct b{color:var(--red)}
.carr{margin:2px 0 3px 9px;color:var(--ink3);font-size:10px;border-left:2px dotted var(--line2);padding:2px 0 2px 13px}
.cite{display:inline-block;background:#eef1f5;border:1px solid var(--line);color:var(--ink2);font-family:'IBM Plex Mono';font-size:10px;padding:1px 6px;border-radius:4px;margin:4px 3px 0 0}
.ift{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:9px}
.ift div{border-radius:7px;padding:8px 9px;font-size:11.5px;line-height:1.45}
.ift .yes{background:var(--green-soft);border:1px solid #bfe6d2}
.ift .no{background:var(--red-soft);border:1px solid #f3c8c6}
.ift b{display:block;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}
.ift .yes b{color:var(--green)} .ift .no b{color:var(--red)}
.act{margin-top:9px;width:100%;font-size:12px;font-weight:700;background:var(--blue);color:#fff;border:none;border-radius:6px;padding:8px 0}
.act:hover{background:#2260b8}
.act.done{background:var(--green)}
.statusline{font-size:11.5px;color:var(--ink2);border:1px dashed var(--line2);border-radius:7px;padding:7px 10px;margin-bottom:7px;display:flex;gap:8px;align-items:center}
.handled{border-top:1px solid var(--line);margin-top:8px;padding-top:8px}
.handled summary{font-size:11.5px;color:var(--ink3);cursor:pointer;font-weight:700}
.hitem{display:flex;gap:7px;font-size:11.5px;color:var(--ink2);padding:5px 0 0 2px}
.hitem .ok{color:var(--green);flex-shrink:0}
.askbar{border-top:1px solid var(--line);padding:11px 14px}
.askrow{display:flex;gap:7px}
.askrow input{flex:1;font-family:inherit;font-size:12.5px;border:1px solid var(--line2);border-radius:6px;padding:8px 11px}
.askrow input:focus{outline:none;border-color:var(--blue)}
.askrow button{font-size:12.5px;font-weight:700;border:none;background:var(--blue);color:#fff;border-radius:6px;padding:0 14px}
.hint{font-size:10.5px;color:var(--ink3);margin-top:7px;line-height:1.7}
.hint b{color:var(--ink2);cursor:pointer;font-weight:600;text-decoration:underline;text-decoration-color:var(--line2)}
</style>
</head>
<body>

<div class="top">
  <div class="logo"><span class="sq">G</span>GlassOps <span style="font-weight:400;color:var(--ink3);font-size:12px">· Productivity Cloud</span></div>
  <div class="zia"><span class="dot"></span><span>Zia agent · last check 06:04 · 6,204 records</span><div class="avatar" id="av">BD</div></div>
</div>

<div class="shell">
  <nav class="side" id="side"></nav>

  <main class="main" id="main"></main>

  <aside class="agent">
    <div class="ahead"><div class="zicon">Z</div><h2>Zia Agent</h2><span class="chip" id="chip"></span></div>
    <div class="abody" id="abody"></div>
    <div class="askbar">
      <div class="askrow"><input id="ask" placeholder="Ask about your area…" onkeydown="if(event.key==='Enter')freeAsk()"><button onclick="freeAsk()">Ask</button></div>
      <div class="hint" id="hints"></div>
    </div>
  </aside>
</div>

<script>
/* ================= shared helpers ================= */
const S = { approved:{}, handledExtra:{} };
function chain(steps){
  return steps.map((s,i)=>{
    const root=s[2]?' root':''; const num=s[2]?'!':(i+1);
    const arr=i<steps.length-1?'<div class="carr">because ↓</div>':'';
    return `<div class="cstep${root}"><span class="cnum">${num}</span><div class="ct"><b>${s[0]}</b>${s[1]}</div></div>${arr}`;
  }).join('');
}
function ift(y,n){return `<div class="ift"><div class="yes"><b>If you OK now</b>${y}</div><div class="no"><b>If you wait</b>${n}</div></div>`;}
function cites(a){return a.map(c=>`<span class="cite">${c}</span>`).join('');}
function pillFor(k){return S.approved[k]?'<span class="pill pg">✓ Approved</span>':'<span class="pill po">Pending</span>';}
/* ================= sidebar (role navigation + live pending badges) ================= */
const NAV = [
  ['Command center', [['board', 'BD', 'Board — Global']]],
  ['Sales teams', [['nsales', 'NS', 'National Sales'], ['snorth', 'N', 'North'], ['ssouth', 'S', 'South'],
    ['swest', 'W', 'West'], ['seast', 'E', 'East & NE'], ['sexp', 'EX', 'Export']]],
  ['Plants & supply', [['ppune', 'PU', 'Pune Plant'], ['pchn', 'CH', 'Chennai Plant'], ['proc', 'PR', 'Procurement']]],
];
const NAV_MODULES = [
  ['Zoho modules', ['Sales (CRM)', 'Production (Creator)', 'Supply Chain (Creator)', 'Quality (Creator)', 'Support (Desk)']],
  ['Intelligence', ['Zia Agent', 'Analytics']],
];
function renderSide(){
  let h = '';
  for (const [sec, items] of NAV) {
    h += `<div class="sec">${sec}</div>`;
    for (const [r, av, label] of items) {
      const pend = ROLES[r].decisions.filter(k => !S.approved[k]).length;
      h += `<a class="${cur === r ? 'on' : ''}" href="#" onclick="render('${r}');return false">
            <span class="av2">${av}</span>${label}
            ${pend ? `<span class="badge">${pend}</span>` : '<span class="badge ok">✓</span>'}</a>`;
    }
  }
  for (const [sec, items] of NAV_MODULES) {
    h += `<div class="sec">${sec}</div>`;
    for (const label of items) h += `<a class="dead" href="#" onclick="return false"><span class="ic"></span>${label}</a>`;
  }
  document.getElementById('side').innerHTML = h;
}
function raceCard(){return `<div class="card"><h2>Region race — Q2 targets <span class="src">CRM Region_Targets</span></h2><div class="sub">Booked vs target · growth vs last quarter · who wins, who's blocked, and why</div>
   <table><tr><th>#</th><th>Region</th><th>Booked / target</th><th>Attain.</th><th>Growth QoQ</th><th>Status</th><th>Blocker / note</th></tr>
   <tr><td class="n">1</td><td><b>North 🏆</b></td><td class="n">₹160L / ₹150L</td><td class="n">107%</td><td class="n up">▲ 10.1%</td><td><span class="pill pg">Achieved</span></td><td>Quarter winner — quote template is the company benchmark</td></tr>
   <tr><td class="n">2</td><td><b>Export ⚡</b></td><td class="n">₹58L / ₹55L</td><td class="n">105%</td><td class="n up">▲ 14.8%</td><td><span class="pill pg">Achieved</span></td><td>Fastest-growing — but 2 vessel cutoffs put the September re-tender at risk</td></tr>
   <tr><td class="n">3</td><td><b>West</b></td><td class="n">₹199L / ₹195L</td><td class="n">102%</td><td class="n up">▲ 9.2%</td><td><span class="pill pg">Achieved</span></td><td>Watch — Pune supply issue may cost August deliveries</td></tr>
   <tr class="hot"><td class="n">4</td><td><b>South</b></td><td class="n">₹105L / ₹115L</td><td class="n">92%</td><td class="n dn">▼ 3.0%</td><td><span class="pill pr">Missed</span></td><td><b>Roadblock:</b> ₹52L stuck at pricing — releasing it clears the target</td></tr>
   <tr class="hot"><td class="n">5</td><td><b>East &amp; NE</b></td><td class="n">₹28.5L / ₹35L</td><td class="n">81%</td><td class="n dn">▼ 3.4%</td><td><span class="pill pr">Missed</span></td><td><b>Roadblock:</b> freight 2× other regions — losing on landed price</td></tr></table></div>`;}

/* ================= decisions library ================= */
const DEC = {
 'proc-dual':{sev:'r',title:'Use 2 suppliers for soda ash (60/40)',one:'stops the late-delivery chain · ₹6L/week back',owner:'Procurement Head',
   h:()=>chain([['Customers','2 key accounts may leave — ₹15L orders late, ₹18L renewal in danger'],
     ['Delivery','their orders missed promised dates (on-time fell to 88% this month)'],
     ['Production','Pune plant stood still 11.2 hours'],
     ['Materials','soda ash stock fell to 2.1 days'],
     ['Supplier','Meridian delivered on time only 1 of last 6 POs',true]])
   +cites(['PO-2214','PO-2221','DT-1142','SO-1188'])
   +ift('Gujarat Alkalies (98% on-time) takes 40% from next order. ₹6L/week back, spot-buy premium gone.','Chain repeats weekly ≈ ₹96L over 8 weeks; Sunrise likely walks in October.')},
 'pune-shift':{sev:'a',title:'Shift 3 stuck batches to Vadodara V2',one:'V2 has 18% spare capacity this week',owner:'Plant Head — Pune',
   h:()=>chain([['Delivery','2 customer orders already late; 1 more due Friday'],
     ['Production','P1 lost 11.2 hours; the batch plan is behind'],
     ['Capacity','Vadodara V2 runs the same containers and has 18% spare this week',true]])
   +cites(['DT-1142','RUN-V2-W29'])
   +ift('3 batches move tonight — Friday order ships on time.','Third order goes late; support tickets and claims follow.')},
 'chn-train':{sev:'a',title:'Train the C2 night crew (1 week)',one:'stops defects reaching customers · ₹1.1L/week',owner:'Plant Head — Chennai',
   h:()=>chain([['Customers','warranty claims jumped by 4 this week'],
     ['Quality','all 4 trace to C2 night batches — 3.3% defects vs 1.8% on day shift'],
     ['Production','machine settings changed in the Jul 6 service'],
     ['People','the night crew (Group B) was never trained on the new settings',true]])
   +cites(['QC-LOG-C2','MAINT-2065','CLAIM-2210'])
   +ift('1 week pairing with the day-shift lead. Defects back to 1.8%, ₹1.1L/week saved.','Every night run leaks defects to customers; claims keep climbing.')},
 'chn-cullet':{sev:'g',title:'Adopt Vadodara’s 34% recycled-glass mix',one:'proven: energy −3%, waste down, quality flat',owner:'Plant Head — Chennai',
   h:()=>chain([['Vadodara','raised recycled glass to 34% three weeks ago'],
     ['Result','energy per ton −3%, waste −0.6pp, defect rate unchanged'],
     ['Chennai','runs the same furnace chemistry — nothing blocks adoption',true]])
   +cites(['BATCH-VAD','PO-2188','ENERGY-LOG'])
   +ift('≈ ₹1.8L saved every month at Chennai, starting next batch plan.','Money stays on the table; Vadodara’s lesson goes unused.')},
 'nsales-deleg':{sev:'a',title:'Give South head price-approval rights <₹5L',one:'releases 9 stuck deals · ₹38L unlocked',owner:'National Sales Head',
   h:()=>chain([['Production','Chennai plant runs 68% full — a furnace burns nearly the same power at 68% as at 95% (₹23L idle cost)'],
     ['Sales','order book covers just 2.1 months and is shrinking'],
     ['Process','9 South deals worth ₹52L wait ~11 days each for head-office price approval',true]])
   +cites(['APPR-LOG','DEAL-3021','CAP-PLAN-CHN'])
   +ift('South head approves deals under ₹5L himself. ₹38L released, furnace fills.','Deals age out; the furnace keeps burning money half-empty.')},
 'south-esc':{sev:'a',title:'Escalate the 3 oldest approvals today',one:'DEAL-3021 · 3014 · 3007 — waiting 12–14 days',owner:'Sales Head — South',
   h:()=>chain([['Your pipeline','9 deals ₹52L stuck at pricing; the 3 oldest are 12–14 days'],
     ['Customer risk','Crown Breweries hinted at a competitor quote on DEAL-3021'],
     ['Process','delegation is pending with the National Sales Head — escalation is what YOU can do today',true]])
   +cites(['APPR-LOG','DEAL-3021'])
   +ift('Finance head reviews 3 today; ₹23.5L can close this week.','Oldest deals likely die; monthly target slips ~₹20L.')},
 'east-fob':{sev:'a',title:'Trial FOB pricing on next 3 East quotes',one:'isolates freight as the reason we lose',owner:'Sales Head — East & NE',
   h:()=>chain([['Your results','East wins only 15% of deals vs ~45% elsewhere'],
     ['Price','quotes run ~7% higher here — freight is 2× other regions'],
     ['Transport','orders travel 5.8 days from Chennai/Pune; there is no closer stock',true]])
   +cites(['FREIGHT-W29','DEAL-3140'])
   +ift('3 FOB quotes this month prove (or clear) freight as the loss driver — data for the depot case.','Keep losing on landed price; ₹9L margin/quarter keeps leaking.')},
 'board-depot':{sev:'a',title:'Fund costing study: Kolkata stock point',one:'network decision — needs the board',owner:'Board',
   h:()=>chain([['East & NE','weakest region: 15% win rate, freight 2× other regions'],
     ['Transport','5.8 days to customer vs 4.1 company average'],
     ['Network','no plant or warehouse east of Chennai — a structural gap only the board can fix',true]])
   +cites(['FREIGHT-W29','DEAL-3140'])
   +ift('Costing study (2 weeks). If viable: delivery 1.5 days, freight halves, East opens up.','East stays our permanently weakest region; competitors entrench.')},
 'west-sunrise':{sev:'a',title:'Pre-renewal save call with Sunrise Bottling',one:'₹18L Oct renewal · churn score 72 — highest of 24 accounts',owner:'Sales Head — West',
   h:()=>chain([['Customers','Sunrise churn score hit 72 — highest of all 24 accounts; ₹18L renewal opens in October'],
     ['Contract','their agreement has an on-time clause — 2 late orders this month triggered it'],
     ['Delivery','SO-1188 (2 days late) and SO-1192 both came off the idled Pune line'],
     ['Supply','Meridian’s late soda ash caused the idle — that fix is with Procurement; the relationship is YOURS',true]])

/* ================= rendering ================= */
let cur='board', briefIdx=0;
function render(role){
  cur=role; const R=ROLES[role];
  document.getElementById('av').textContent=R.av;
  document.getElementById('main').innerHTML =
    `<div class="crumb">Home / ${R.crumb}</div>
     <div class="title"><h1>${R.title}</h1><span class="sub">${R.sub}</span></div>
     <div class="insight"><span class="tag">ZIA</span><div>${R.insight}</div></div>
     <div class="kpis">${R.kpis.map(k=>`<div class="kpi"><div class="l">${k[0]}</div><div class="v">${k[1]}</div><div class="d ${k[3]}">${k[2]}</div></div>`).join('')}</div>
     ${R.main()}`;
  renderAgent();
}
function renderAgent(){
  renderSide();
  const R=ROLES[cur];
  const pend=R.decisions.filter(k=>!S.approved[k]).length;
  const chipEl=document.getElementById('chip');
  chipEl.textContent = pend? `${pend} decision${pend>1?'s':''} for you` : 'All clear ✓';
  chipEl.style.cssText = pend? '' : 'background:var(--green-soft);color:var(--green)';
  let h='';
  h+=`<div class="sechead">Needs your OK</div>`;
  R.decisions.forEach((k,i)=>{
    const d=DEC[k]; const done=S.approved[k];
    h+=`<div class="dcard${done?' done':''}"><div class="dnum">${done?'✓':i+1}</div>
        <div class="dbody"><b>${d.title}</b><span>${d.one}</span></div>
        <div class="dbtns"><button class="mini" onclick="showDec('${k}')">Why?</button>
        <button class="mini ok" ${done?'disabled':''} onclick="okDec('${k}',this)">${done?'✓':'OK'}</button></div></div>`;
  });
  if(R.statuses.length){
    h+=`<div class="sechead" style="margin-top:10px">Being handled elsewhere</div>`;
    R.statuses.forEach(([k,label])=>{
      h+=`<div class="statusline" data-status="${k}">${pillFor(k)}<span>${label}</span></div>`;
    });
  }
  h+=`<div class="detail" id="detail"></div>`;
  const extra=(S.handledExtra[cur]||[]);
  h+=`<details class="handled" open><summary>Handled by the agent — ${R.handled.length+extra.length} ✓</summary>`;
  extra.concat(R.handled).forEach(x=>h+=`<div class="hitem"><span class="ok">✓</span><span>${x}</span></div>`);
  h+=`</details>`;
  document.getElementById('abody').innerHTML=h;
  document.getElementById('hints').innerHTML='Try: '+R.hints.map(x=>`<b onclick="showDec('${x[1]}');document.getElementById('ask').value='${x[0]}'">${x[0]}</b>`).join(' · ');
  showDec(R.decisions[0]);
}
function showDec(k){
  const d=DEC[k]; if(!d)return;
  const btn = S.approved[k]
    ? `<button class="act done" disabled>✓ Approved — teams notified</button>`
    : (ROLES[cur].decisions.includes(k)
        ? `<button class="act" onclick="okDec('${k}',this)">OK — do it</button>`
        : `<button class="act done" style="background:#eef1f5;color:var(--ink2)" disabled>Owner: ${d.owner}</button>`);
  document.getElementById('detail').innerHTML =
    `<div class="dt"><span class="sev ${d.sev}">${d.sev==='r'?'URGENT':d.sev==='a'?'ATTENTION':'OPPORTUNITY'}</span>${d.title}</div>${d.h()}${btn}`;
  document.getElementById('detail').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function okDec(k,btn){
  S.approved[k]=true;
  (S.handledExtra[cur]=S.handledExtra[cur]||[]).unshift(`Approved: ${DEC[k].title} — owner & teams notified in Cliq, task created in Projects`);
  document.querySelectorAll(`[data-status="${k}"]`).forEach(el=>{ if(el.tagName==='TD'||el.classList.contains('statusline')) el.querySelector('.pill') ? el.querySelector('.pill').outerHTML=pillFor(k) : el.innerHTML=pillFor(k); });
  renderAgent();
}
function freeAsk(){
  const v=document.getElementById('ask').value.toLowerCase();
  const R=ROLES[cur];
  const hit=R.hints.find(h=>v.includes(h[0].split(' ')[2]||'zzz')) || null;
  if(v.includes('biggest')||v.includes('risk')||v.includes('problem')) showDec(R.decisions[0]);
  else if(hit) showDec(hit[1]);
  else if(v.trim()) document.getElementById('detail').innerHTML =
    `<div class="dt"><span class="sev a">LIVE</span>Live agent call</div>In the real build this goes to the Zia agent on Catalyst with your role, region/plant and current filters as context — it reads CRM + Creator + Desk and answers here with a why-chain and proof records. This demo has wired answers for the questions under the ask box and every decision.`;
}
render('board');
</script>
