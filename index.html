  --orange:#e08a00; --orange-soft:#fdf3e0;

}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--ink);font-size:13.5px}
button{font-family:inherit;cursor:pointer}
.mono{font-family:'IBM Plex Mono',monospace}

/* top bar */
.top{height:52px;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 18px;position:sticky;top:0;z-index:20}
.logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px}
.logo .sq{width:26px;height:26px;border-radius:6px;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:13px}
.rolebox{margin-left:18px;display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink2)}
.rolebox select{font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);border:1px solid var(--line2);border-radius:6px;padding:6px 10px;background:var(--card)}
.zia{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink2)}
.zia .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--blue-soft);color:var(--blue);display:grid;place-items:center;font-weight:700;font-size:12px}

/* shell */
.shell{display:grid;grid-template-columns:216px 1fr 380px;min-height:calc(100vh - 52px)}

.side a.on{color:var(--blue);border-left-color:var(--blue);background:var(--blue-soft);font-weight:600}
.side a:hover{background:#f6f8fa}

.side a.on .ic{background:var(--blue);opacity:1}
.side .sec{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);padding:12px 16px 5px}

.side .badge.ok{background:var(--green-soft);color:var(--green)}

.side a.on .av2{background:var(--blue);color:#fff}

/* main */
.main{padding:16px 18px;min-width:0}
.crumb{font-size:12px;color:var(--ink3);margin-bottom:4px}
.title{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.title h1{font-size:18px;font-weight:700}
.title .sub{font-size:12.5px;color:var(--ink2)}
.insight{background:var(--blue-soft);border:1px solid #cfe1f8;border-radius:var(--r);padding:12px 15px;font-size:13px;line-height:1.5;margin-bottom:16px;display:flex;gap:10px}
.insight .tag{flex-shrink:0;background:var(--blue);color:#fff;font-size:10.5px;font-weight:700;letter-spacing:.05em;padding:3px 9px;border-radius:5px;height:fit-content;margin-top:1px}
.insight>div{max-width:74ch}
.insight b{color:var(--blue);display:block;font-size:14.5px;line-height:1.35;margin-bottom:4px}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px}
.kpi.risk{border-left:3px solid var(--red)}
.kpi .l{font-size:12px;color:var(--ink3);letter-spacing:.03em;text-transform:uppercase}
.kpi .v{font-size:24px;font-weight:700;margin-top:3px}
.kpi.risk .v{color:var(--red)}
.kpi .d{font-size:12px;margin-top:3px;color:var(--ink2)}
.up{color:var(--green)} .dn{color:var(--red)} .fl{color:var(--ink3)} .warn{color:var(--orange)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:1500px){.grid2{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;margin-bottom:18px}
.card.focus{border-color:#f3c8c6;box-shadow:0 1px 3px rgba(34,48,60,.06)}
.card h2{font-size:15px;font-weight:700;letter-spacing:-0.01em;line-height:1.25;margin-bottom:3px;display:flex;align-items:center;gap:8px}
.card h2 .src{margin-left:auto;font-size:10px;font-weight:400;color:var(--ink3);font-family:'IBM Plex Mono'}
.card .sub{font-size:12px;color:var(--ink3);line-height:1.4;margin-bottom:12px}
.seclabel{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);font-weight:700;margin:2px 0 8px}
table{width:100%;border-collapse:collapse;font-size:13px;line-height:1.5}

td.note{max-width:280px}

.status{display:flex;flex-direction:column;gap:4px;align-items:flex-start}

tr.hot td{background:#fff}
tr.hot td:first-child{box-shadow:inset 3px 0 0 var(--red)}
tr.critical td{background:var(--red-soft)}
tr.critical td:first-child{box-shadow:inset 3px 0 0 var(--red)}

tr.hot:hover td{background:#f7f9fb}
tr.critical:hover td{background:#fbe2e2}
.foldcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;margin-bottom:18px}
.foldcard>summary{list-style:none;cursor:pointer;font-size:15px;font-weight:700;letter-spacing:-0.01em;line-height:1.3;display:flex;align-items:center;gap:8px}
.foldcard>summary::-webkit-details-marker{display:none}
.foldcard>summary .src{margin-left:auto;font-size:10px;font-weight:400;color:var(--ink3);font-family:'IBM Plex Mono'}
.foldcard>summary::after{content:'▸';font-size:12px;color:var(--ink3);flex-shrink:0;margin-left:10px}
.foldcard[open]>summary::after{content:'▾'}
.foldcard table{margin-top:14px}
.pill{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.pg{background:var(--green-soft);color:var(--green)} .po{background:var(--orange-soft);color:var(--orange)} .pr{background:var(--red-soft);color:var(--red)} .pb{background:var(--blue-soft);color:var(--blue)}

.sechead{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin:2px 0 8px;font-weight:700}

<script>
/* ================= shared helpers ================= */
const S = { approved:{}, handledExtra:{} };
function chain(steps){
  return steps.map((s,i)=>{
    const root=s[2]?' root':''; const num=s[2]?'!':(i+1);
    const arr=i<steps.length-1?'<div class="carr">because ↓</div>':'';
    return `<div class="cstep${root}"><span class="cnum">${num}</span><div class="ct"><b>${s[0]}</b>${s[1]}</div></div>${arr}`;
  }).join('');
}
function ift(y,n){return `<div class="ift"><div class="yes"><b>If you OK now</b>${y}</div><div class="no"><b>If you wait</b>${n}</div></div>`;}
function cites(a){return a.map(c=>`<span class="cite">${c}</span>`).join('');}
function pillFor(k){return S.approved[k]?'<span class="pill pg">✓ Approved</span>':'<span class="pill po">Pending</span>';}
/* ================= sidebar (role navigation + live pending badges) ================= */
const NAV = [
  ['Command center', [['board', 'BD', 'Board — Global']]],
  ['Sales teams', [['nsales', 'NS', 'National Sales'], ['snorth', 'N', 'North'], ['ssouth', 'S', 'South'],
    ['swest', 'W', 'West'], ['seast', 'E', 'East & NE'], ['sexp', 'EX', 'Export']]],
  ['Plants & supply', [['ppune', 'PU', 'Pune Plant'], ['pchn', 'CH', 'Chennai Plant'], ['proc', 'PR', 'Procurement']]],
];
const NAV_MODULES = [
  ['Zoho modules', ['Sales (CRM)', 'Production (Creator)', 'Supply Chain (Creator)', 'Quality (Creator)', 'Support (Desk)']],
  ['Intelligence', ['Zia Agent', 'Analytics']],
];
function renderSide(){
  let h = '';
  for (const [sec, items] of NAV) {
    h += `<div class="sec">${sec}</div>`;
    for (const [r, av, label] of items) {
      const pend = ROLES[r].decisions.filter(k => !S.approved[k]).length;
      h += `<a class="${cur === r ? 'on' : ''}" href="#" onclick="render('${r}');return false">
            <span class="av2">${av}</span>${label}
            ${pend ? `<span class="badge">${pend}</span>` : '<span class="badge ok">✓</span>'}</a>`;
    }
  }
  for (const [sec, items] of NAV_MODULES) {
    h += `<div class="sec">${sec}</div>`;
    for (const label of items) h += `<a class="dead" href="#" onclick="return false"><span class="ic"></span>${label}</a>`;
  }
  document.getElementById('side').innerHTML = h;
}
function raceCard(){return `<details class="foldcard"><summary>Region race — North wins Q2 (107%); South &amp; East missed target <span class="src">CRM Region_Targets</span></summary>

   <tr><td class="n">1</td><td><b>North 🏆</b></td><td class="n qty">₹160L / ₹150L</td><td class="n qty">107%</td><td class="n qty up">▲ 10.1%</td><td><span class="pill pg">Achieved</span></td><td class="note"><b>Quarter winner</b><span class="cd">Quote template is the company benchmark.</span></td></tr>
   <tr><td class="n">2</td><td><b>Export ⚡</b></td><td class="n qty">₹58L / ₹55L</td><td class="n qty">105%</td><td class="n qty up">▲ 14.8%</td><td><span class="pill pg">Achieved</span></td><td class="note"><b>Fastest-growing</b><span class="cd">2 vessel cutoffs put the September re-tender at risk.</span></td></tr>
   <tr><td class="n">3</td><td><b>West</b></td><td class="n qty">₹199L / ₹195L</td><td class="n qty">102%</td><td class="n qty up">▲ 9.2%</td><td><span class="pill pg">Achieved</span></td><td class="note"><b>Watch</b><span class="cd">Pune supply issue may cost August deliveries.</span></td></tr>
   <tr class="critical"><td class="n">4</td><td><b>South</b></td><td class="n qty">₹105L / ₹115L</td><td class="n qty">92%</td><td class="n qty dn">▼ 3.0%</td><td><span class="pill pr">Missed</span></td><td class="note"><b>Roadblock: ₹52L stuck at pricing</b><span class="cd">Releasing it clears the target.</span></td></tr>
   <tr class="hot"><td class="n">5</td><td><b>East &amp; NE</b></td><td class="n qty">₹28.5L / ₹35L</td><td class="n qty">81%</td><td class="n qty dn">▼ 3.4%</td><td><span class="pill pr">Missed</span></td><td class="note"><b>Roadblock: freight 2× other regions</b><span class="cd">Losing on landed price.</span></td></tr></table></details>`;}

/* ================= decisions library ================= */
const DEC = {
 'proc-dual':{sev:'r',title:'Use 2 suppliers for soda ash (60/40)',one:'stops the late-delivery chain · ₹6L/week back',owner:'Procurement Head',
   h:()=>chain([['Customers','2 key accounts may leave — ₹15L orders late, ₹18L renewal in danger'],
     ['Delivery','their orders missed promised dates (on-time fell to 88% this month)'],
     ['Production','Pune plant stood still 11.2 hours'],

   +ift('Gujarat Alkalies (98% on-time) takes 40% from next order. ₹6L/week back, no more +14% emergency buys.','Chain repeats weekly ≈ ₹96L over 8 weeks; Sunrise likely walks in October.')},
 'pune-shift':{sev:'a',title:'Shift 3 stuck batches to Vadodara V2',one:'V2 has 18% spare capacity this week',owner:'Plant Head — Pune',
   h:()=>chain([['Delivery','2 customer orders already late; 1 more due Friday'],
     ['Production','P1 lost 11.2 hours; the batch plan is behind'],

   +cites(['DT-1142','RUN-V2-W29'])

 'chn-train':{sev:'a',title:'Train the C2 night crew (1 week)',one:'stops defects reaching customers · ₹1.1L/week',owner:'Plant Head — Chennai',

   +ift('Finance head reviews 3 today; ₹23.5L can close this week.','Oldest deals likely die; monthly target slips ~₹20L.')},

   h:()=>chain([['Your results','East wins only 15% of deals vs ~45% elsewhere'],

board:{av:'BD',crumb:'Global',title:'Board — Productivity across the organisation',sub:'Week 29 · all regions · all plants',

 main:()=>`

   <tr><td>Sunrise pre-renewal call</td><td>Sales Head — West</td><td data-status="west-sunrise">${pillFor('west-sunrise')}</td></tr></table></div>

  <div class="seclabel">The detail</div>

/* ================= rendering ================= */
let cur='board', briefIdx=0;
function render(role){
  cur=role; const R=ROLES[role];
  document.getElementById('av').textContent=R.av;
  document.getElementById('main').innerHTML =
    `<div class="crumb">Home / ${R.crumb}</div>
     <div class="title"><h1>${R.title}</h1><span class="sub">${R.sub}</span></div>
     <div class="insight"><span class="tag">ZIA</span><div>${R.insight}</div></div>
     <div class="kpis">${R.kpis.map(k=>`<div class="kpi ${k[4]||''}"><div class="l">${k[0]}</div><div class="v">${k[1]}</div><div class="d ${k[3]}">${k[2]}</div></div>`).join('')}</div>
     ${R.main()}`;
  renderAgent();
}
function renderAgent(){
  renderSide();
  const R=ROLES[cur];
  const pend=R.decisions.filter(k=>!S.approved[k]).length;
  const chipEl=document.getElementById('chip');
  chipEl.textContent = pend? `${pend} decision${pend>1?'s':''} for you` : 'All clear ✓';
  chipEl.style.cssText = pend? '' : 'background:var(--green-soft);color:var(--green)';
  let h='';
  h+=`<div class="sechead">Needs your OK</div>`;
  R.decisions.forEach((k,i)=>{
    const d=DEC[k]; const done=S.approved[k];
    h+=`<div class="dcard${done?' done':''}"><div class="dnum">${done?'✓':i+1}</div>
        <div class="dbody"><b>${d.title}</b><span>${d.one}</span></div>
        <div class="dbtns"><button class="mini" onclick="showDec('${k}')">Why?</button>
        <button class="mini ok" ${done?'disabled':''} onclick="okDec('${k}',this)">${done?'✓':'OK'}</button></div></div>`;
  });
  if(R.statuses.length){
    h+=`<div class="sechead" style="margin-top:10px">Being handled elsewhere</div>`;
    R.statuses.forEach(([k,label])=>{
      h+=`<div class="statusline" data-status="${k}">${pillFor(k)}<span>${label}</span></div>`;
    });
  }
  h+=`<div class="detail" id="detail"></div>`;
  const extra=(S.handledExtra[cur]||[]);
  h+=`<details class="handled" open><summary>Handled by the agent — ${R.handled.length+extra.length} ✓</summary>`;
  extra.concat(R.handled).forEach(x=>h+=`<div class="hitem"><span class="ok">✓</span><span>${x}</span></div>`);
  h+=`</details>`;
  document.getElementById('abody').innerHTML=h;
  document.getElementById('hints').innerHTML='Try: '+R.hints.map(x=>`<b onclick="showDec('${x[1]}');document.getElementById('ask').value='${x[0]}'">${x[0]}</b>`).join(' · ');
  showDec(R.decisions[0]);
}
function showDec(k){
  const d=DEC[k]; if(!d)return;
  const btn = S.approved[k]
    ? `<button class="act done" disabled>✓ Approved — teams notified</button>`
    : (ROLES[cur].decisions.includes(k)
        ? `<button class="act" onclick="okDec('${k}',this)">OK — do it</button>`
        : `<button class="act done" style="background:#eef1f5;color:var(--ink2)" disabled>Owner: ${d.owner}</button>`);
  document.getElementById('detail').innerHTML =
    `<div class="dt"><span class="sev ${d.sev}">${d.sev==='r'?'URGENT':d.sev==='a'?'ATTENTION':'OPPORTUNITY'}</span>${d.title}</div>${d.h()}${btn}`;
  document.getElementById('detail').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function okDec(k,btn){
  S.approved[k]=true;
  (S.handledExtra[cur]=S.handledExtra[cur]||[]).unshift(`Approved: ${DEC[k].title} — owner & teams notified in Cliq, task created in Projects`);
  document.querySelectorAll(`[data-status="${k}"]`).forEach(el=>{ if(el.tagName==='TD'||el.classList.contains('statusline')) el.querySelector('.pill') ? el.querySelector('.pill').outerHTML=pillFor(k) : el.innerHTML=pillFor(k); });
  renderAgent();
}
function freeAsk(){
  const v=document.getElementById('ask').value.toLowerCase();
  const R=ROLES[cur];
  const hit=R.hints.find(h=>v.includes(h[0].split(' ')[2]||'zzz')) || null;
  if(v.includes('biggest')||v.includes('risk')||v.includes('problem')) showDec(R.decisions[0]);
  else if(hit) showDec(hit[1]);
  else if(v.trim()) document.getElementById('detail').innerHTML =
    `<div class="dt"><span class="sev a">LIVE</span>Live agent call</div>In the real build this goes to the Zia agent on Catalyst with your role, region/plant and current filters as context — it reads CRM + Creator + Desk and answers here with a why-chain and proof records. This demo has wired answers for the questions under the ask box and every decision.`;
}
function switchUI(name,btn){
  document.querySelectorAll('style.uitheme').forEach(function(s){ s.media = (s.getAttribute('data-ui')===name?'all':'not all'); });
  document.querySelectorAll('.uiswitch button').forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-ui')===name); });
}
render('board');
</script>
